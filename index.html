  </footer>);

function App(){
  const mob=useMobile();const[active,setActive]=useState('about');
  useEffect(()=>{
    if(mob){const el=document.getElementById('cg');if(el)el.style.display='none';return;}
    const el=document.getElementById('cg');if(el)el.style.display='block';
    const h=e=>{if(el)el.style.transform=`translate(${e.clientX-350}px,${e.clientY-350}px)`;};
    window.addEventListener('mousemove',h,{passive:true});return()=>window.removeEventListener('mousemove',h);
  },[mob]);
  useEffect(()=>{
    const sections=['about','systems','thinking','experience','skills','contact'];
    const obs=new IntersectionObserver(entries=>{entries.forEach(en=>{if(en.isIntersecting)setActive(en.target.id);});},{threshold:0.2});
    sections.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);
  return(<div><Nav active={active}/><Hero/><Band/><Systems/><Thinking/><Experience/><Skills/><Contact/><Footer/></div>);
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
