    const h=e=>{if(el)el.style.transform=`translate(${e.clientX-350}px,${e.clientY-350}px)`;};
    window.addEventListener('mousemove',h,{passive:true});return()=>window.removeEventListener('mousemove',h);
  },[mob]);
  useEffect(()=>{
    const sections=['about','experience','thinking','skills','lab','contact'];
    const obs=new IntersectionObserver(entries=>{entries.forEach(en=>{if(en.isIntersecting)setActive(en.target.id);});},{threshold:0.2});
    sections.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);
  return(<div><Nav active={active}/><Hero/><Band/><Experience/><Thinking/><Skills/><Lab/><Contact/><Footer/></div>);
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
