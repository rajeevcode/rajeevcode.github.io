// Reveal hook
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.rv');
    const obs=new IntersectionObserver(en=>{en.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.08});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
}

function App(){
  const [active,setActive]=useState('about');
  useEffect(()=>{
    const el=document.getElementById('cg');
    const h=e=>{if(el)el.style.transform=`translate(${e.clientX-350}px,${e.clientY-350}px)`;};
    window.addEventListener('mousemove',h,{passive:true});
    return()=>window.removeEventListener('mousemove',h);
  },[]);
  useEffect(()=>{
    const sections=['about','experience','thinking','skills','lab','contact'];
    const obs=new IntersectionObserver(entries=>{entries.forEach(en=>{if(en.isIntersecting)setActive(en.target.id);});},{threshold:0.25});
    sections.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);
  return(
    <div>
      <Nav active={active}/>
      <Hero/>
      <Band/>
      <Experience/>
      <Thinking/>
      <Skills/>
      <Lab/>
      <Contact/>
      <Footer/>
    </div>
  );
}
